<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-logo">P</div>
      <h1>Create account</h1>
      <p>Start managing your payments</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="name">Full name</label>
        <input
          id="name"
          type="text"
          formControlName="name"
          placeholder="John Doe"
          [class.error]="name.invalid && name.touched"
        />
        <span class="error-msg" *ngIf="name.invalid && name.touched">
          Name is required
        </span>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.error]="email.invalid && email.touched"
        />
        <span class="error-msg" *ngIf="email.invalid && email.touched">
          Please enter a valid email
        </span>
      </div>

      <div class="form-group">
        <label for="phone">Phone <span class="optional">optional</span></label>
        <input
          id="phone"
          type="tel"
          formControlName="phone"
          placeholder="+7 999 123 4567"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [class.error]="password.invalid && password.touched"
        />
        <span class="error-msg" *ngIf="password.invalid && password.touched">
          Password must be at least 6 characters
        </span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm password</label>
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          placeholder="••••••••"
          [class.error]="form.hasError('passwordMismatch') && confirmPassword.touched"
        />
        <span class="error-msg" *ngIf="form.hasError('passwordMismatch') && confirmPassword.touched">
          Passwords do not match
        </span>
      </div>

      <div class="error-banner" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="loading" class="btn-primary">
        <span *ngIf="!loading">Create account</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

    </form>

    <p class="auth-footer">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>

  </div>
</div>
