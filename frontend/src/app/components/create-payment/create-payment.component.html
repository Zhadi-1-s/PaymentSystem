<div class="modal-backdrop" *ngIf="isOpen" (click)="onBackdropClick($event)">
  <div class="modal">

    <div class="modal-header">
      <h2>New payment</h2>
      <button class="close-btn" (click)="close()">✕</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="modal-body">

        <div class="company-info" *ngIf="selectedCompany">
          <div class="company-info-name">{{ selectedCompany.name }}</div>
          <div class="company-info-rules">
            Currencies: {{ selectedCompany.allowedCurrencies.join(', ') }} &nbsp;|&nbsp;
            Amount: ${{ selectedCompany.minAmount }} – ${{ selectedCompany.maxAmount | number }}
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Wallet number *</label>
            <input
              type="text"
              formControlName="walletNumber"
              placeholder="WALLET-001"
              [class.error]="walletNumber.invalid && walletNumber.touched"
            />
            <span class="error-msg" *ngIf="walletNumber.invalid && walletNumber.touched">
              Required
            </span>
          </div>

        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Email *</label>
            <input
              type="email"
              formControlName="email"
              placeholder="you@example.com"
              [class.error]="email.invalid && email.touched"
            />
            <span class="error-msg" *ngIf="email.invalid && email.touched">
              Valid email required
            </span>
          </div>

          <div class="form-group">
            <label>Phone <span class="optional">optional</span></label>
            <input
              type="tel"
              formControlName="phone"
              placeholder="+7 999 123 4567"
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Amount *</label>
            <input
              type="number"
              formControlName="amount"
              placeholder="0.00"
              min="0.01"
              step="0.01"
              [class.error]="amount.invalid && amount.touched"
            />
            <span class="error-msg" *ngIf="amount.invalid && amount.touched">
              Must be greater than 0
            </span>
          </div>

          <div class="form-group">
            <label>Currency *</label>
            <select formControlName="currency">
              <option *ngFor="let c of currencies" [value]="c">{{ c }}</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Comment <span class="optional">optional</span></label>
          <textarea
            formControlName="comment"
            placeholder="Add a note..."
            rows="3"
          ></textarea>
        </div>

        <div class="error-banner" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" (click)="close()">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="loading">
          <span *ngIf="!loading">Create payment</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </div>

    </form>
  </div>
</div>
